AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  SourceBucketName:
    Type: String
  DestinationBucketName:
    Type: String
  LambdaCodeBucketName:
    Type: String

Resources:

  SourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ! Ref SourceBucketName

  DestinationBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ! Ref DestinationBucketName

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: "*"

  CopyFileLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: CopyFileLambda
      Handler: lambda_function.lambda_handler
      Runtime: python.3.12
      Role: ! GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        S3Bucket: ! Ref LambdaCodeBucketName
        S3Key: lambda.zip
      Environment:
        Variables:
          DESTINATION_BUCKET: ! Ref DestinationBucketName

  S3InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: ! Ref CopyFileLambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: ! GetAtt SourceBucket.Arn

  BucketNotification:
    Type: AWS::S3::Bucket
    DependsOn: S3InvokePermission
    Properties:
      BucketName: !  Ref SourceBucketName
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: ! GetAtt CopyFileLambda.Arn